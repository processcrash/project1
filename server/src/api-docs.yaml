openapi: 3.0.3
info:
  title: CodeSentinel API
  description: |
    AI-Powered Code Review Platform API

    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer YOUR_TOKEN
    ```

    ## Rate Limiting
    API requests are limited to 100 requests per 15 minutes.
  version: 1.0.0
  contact:
    name: CodeSentinel Support
    url: https://codesentinel.ai

servers:
  - url: https://api.codesentinel.ai
    description: Production server
  - url: http://localhost:3001
    description: Development server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Projects
    description: Project management
  - name: Reviews
    description: Code review operations
  - name: Billing
    description: Subscription and billing

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  minLength: 8
                  example: password123
                name:
                  type: string
                  example: John Doe
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid input or email already exists

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated

  /projects:
    get:
      tags: [Projects]
      summary: List user projects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Create new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                repoUrl:
                  type: string
                language:
                  type: string
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get project details
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          description: Project not found

    patch:
      tags: [Projects]
      summary: Update project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                repoUrl:
                  type: string
                language:
                  type: string
      responses:
        '200':
          description: Project updated

    delete:
      tags: [Projects]
      summary: Delete project
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Project deleted

  /reviews:
    post:
      tags: [Reviews]
      summary: Submit code for review
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId]
              properties:
                projectId:
                  type: string
                  format: uuid
                code:
                  type: string
                  description: Code to review (mutually exclusive with diff)
                diff:
                  type: string
                  description: Unified diff to review (mutually exclusive with code)
                language:
                  type: string
                  enum: [javascript, typescript, python, go, rust, java, cpp]
                  default: javascript
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /reviews/{id}:
    get:
      tags: [Reviews]
      summary: Get review result
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Review result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'

  /reviews/project/{projectId}:
    get:
      tags: [Reviews]
      summary: Get project reviews
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'

  /billing/usage:
    get:
      tags: [Billing]
      summary: Get usage statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usage data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageStats'

  /billing/plans:
    get:
      tags: [Billing]
      summary: Get available plans
      responses:
        '200':
          description: List of plans
          content:
            application/json:
              schema:
                type: object

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        repoUrl:
          type: string
        language:
          type: string
        apiKey:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        projectId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, processing, completed, failed]
        language:
          type: string
        result:
          $ref: '#/components/schemas/ReviewResult'
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    ReviewResult:
      type: object
      properties:
        score:
          type: number
          minimum: 1
          maximum: 10
        summary:
          type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/Issue'
        stats:
          type: object
          properties:
            critical:
              type: integer
            high:
              type: integer
            medium:
              type: integer
            low:
              type: integer
        analyzedAt:
          type: string
          format: date-time

    Issue:
      type: object
      properties:
        line:
          type: integer
        severity:
          type: string
          enum: [critical, high, medium, low]
        category:
          type: string
          enum: [bug, security, performance, style, best-practice]
        message:
          type: string
        suggestion:
          type: string
        code:
          type: string

    UsageStats:
      type: object
      properties:
        tier:
          type: string
          enum: [free, pro, team]
        reviewsUsed:
          type: integer
        reviewsLimit:
          type: integer
        projectsLimit:
          type: integer
        resetDate:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: string